<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Şen İletişim | Samet Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#023059;--blue:#048ABF;--turq:#06BFBF;--lime:#D2D904;--red:#D92525;
  --dark:#021423;--soft:#cde8f2;--line:rgba(255,255,255,.14);
  --glass:rgba(255,255,255,.08);--shadow:0 26px 90px rgba(0,0,0,.38)
}
body{
  min-height:100vh;
  background:
    radial-gradient(circle at 10% 5%,rgba(6,191,191,.30),transparent 32%),
    radial-gradient(circle at 90% 10%,rgba(4,138,191,.20),transparent 30%),
    linear-gradient(180deg,var(--navy),var(--dark));
  color:white;
}
button,input,select,textarea{font:inherit}
button{cursor:pointer;border:none}

*{
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
  
.login{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
}
.login-box,.welcome,.stat,.phone-card,.modal-box{
  background:var(--glass);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(16px);
}
.login-box{
  width:100%;
  max-width:420px;
  border-radius:30px;
  padding:30px;
  text-align:center;
}
.logo{
  width:74px;height:74px;margin:0 auto 18px;
  border-radius:24px;
  display:grid;place-items:center;
  background:linear-gradient(135deg,var(--turq),var(--blue),var(--lime));
  color:#021423;font-size:34px;font-weight:900;
}
h1{color:var(--turq);font-size:30px;margin-bottom:6px}
p{color:var(--soft);line-height:1.5}
input,select,textarea{
  width:100%;
  padding:15px;
  border:none;
  outline:none;
  border-radius:16px;
  background:#fff;
  color:#021423;
}
textarea{min-height:95px;resize:vertical}
.main-btn{
  width:100%;
  padding:15px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--turq),var(--blue));
  color:#021423;
  font-weight:900;
}
.error{display:block;margin-top:12px;color:#ff7979;font-weight:900}

.panel{
  display:none;
  max-width:1250px;
  margin:auto;
  padding:18px;
}
.welcome{
  border-radius:30px;
  padding:24px;
  margin-bottom:16px;
}
.welcome h1{
  font-size:clamp(28px,5vw,46px);
  line-height:1.05;
}
.welcome h1 span{color:white}
.welcome p{font-size:16px;font-weight:700}

.top-buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:16px;
}
.exit-btn,.add-btn{
  padding:16px;
  border-radius:18px;
  font-weight:900;
  font-size:16px;
}
.exit-btn{background:#fff;color:var(--navy)}
.add-btn{background:linear-gradient(135deg,var(--turq),var(--blue));color:#021423}

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
  margin-bottom:18px;
}
.stat{
  border-radius:24px;
  padding:20px;
}
.stat b{
  display:block;
  font-size:28px;
  color:var(--lime);
  margin-bottom:4px;
}
.stat span{color:var(--soft);font-weight:800}

.phone-list{
  display:grid;
  gap:14px;
}
.phone-card{
  position:relative;
  border-radius:28px;
  padding:18px;
  display:grid;
  grid-template-columns:1fr 42px;
  gap:16px;
}
.phone-card.sold{
  background:rgba(17,185,87,.22);
  border-color:rgba(17,185,87,.55);
}
.phone-info h2{
  color:#fff;
  font-size:25px;
  margin-bottom:8px;
}
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin:10px 0;
}
.tag{
  padding:8px 11px;
  border-radius:999px;
  background:rgba(6,191,191,.11);
  border:1px solid rgba(6,191,191,.32);
  color:#eaffff;
  font-size:13px;
  font-weight:900;
}
.price-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.price-box{
  padding:13px;
  border-radius:18px;
  background:rgba(0,0,0,.22);
  border:1px solid rgba(255,255,255,.10);
}
.price-box span{
  display:block;
  color:var(--soft);
  font-size:12px;
  font-weight:800;
}
.price-box b{
  color:var(--lime);
  font-size:20px;
}
.menu-dot{
  width:42px;height:42px;
  border-radius:15px;
  background:#fff;
  color:var(--navy);
  font-size:24px;
  font-weight:900;
}
.action-menu{
  position:absolute;
  right:14px;
  top:54px;
  width:118px;
  display:none;
  background:#fff;
  color:var(--navy);
  border-radius:14px;
  padding:6px;
  z-index:5;
  box-shadow:0 14px 35px rgba(0,0,0,.32);
}
.action-menu.active{display:grid;gap:5px}
.action-menu button{
  width:100%;
  padding:8px 9px;
  border-radius:10px;
  font-weight:900;
  text-align:left;
  font-size:12px;
}
.edit{background:#eef8fb;color:var(--navy)}
.sold-btn{background:#dfffe9;color:#087235}
.delete{background:#ffe4e4;color:var(--red)}
.empty{
  padding:35px;
  text-align:center;
  border:1px dashed var(--line);
  border-radius:24px;
  color:var(--soft);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.72);
  backdrop-filter:blur(12px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:32px 18px;
  z-index:9999;
  overflow-y:auto;
}
.modal.active{display:flex}
.modal-box{
  width:100%;
  max-width:760px;
  max-height:calc(100vh - 64px);
  overflow-y:auto;
  border-radius:30px;
  padding:24px;
}
.modal-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  margin-bottom:18px;
}
.close{
  width:42px;height:42px;
  min-width:42px;
  border-radius:15px;
  background:var(--red);
  color:white;
  font-size:24px;
  font-weight:900;
}
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.form-grid label{
  display:grid;
  gap:7px;
  color:var(--soft);
  font-weight:900;
  font-size:13px;
}
.full{grid-column:1/-1}
.save{
  margin-top:16px;
}
footer{
  padding:28px 16px 40px;
  text-align:center;
  color:#9fc5d6;
  font-size:14px;
}
footer b{color:var(--turq)}

@media(max-width:760px){
  .panel{padding:12px}
  .welcome{padding:20px;border-radius:24px}
  .welcome h1{font-size:30px}
  .welcome p{font-size:14px}

  .top-buttons{
    grid-template-columns:1fr 1fr;
    gap:10px;
  }
  .exit-btn,.add-btn{
    padding:14px 10px;
    font-size:14px;
    border-radius:15px;
  }

  .stats{
    grid-template-columns:repeat(3,1fr);
    gap:8px;
  }
  .stat{
    padding:13px 8px;
    border-radius:18px;
    text-align:center;
  }
  .stat b{font-size:20px}
  .stat span{font-size:11px}

  .phone-card{
    grid-template-columns:1fr 34px;
    gap:10px;
    padding:13px;
    border-radius:22px;
  }
  .phone-info h2{
    font-size:18px;
  }
  .tags{
    gap:5px;
    margin:7px 0;
  }
  .tag{
    font-size:10.5px;
    padding:5px 7px;
  }
  .phone-info p{
    font-size:12px;
    line-height:1.35;
  }
  .price-row{
    grid-template-columns:1fr 1fr;
    gap:6px;
  }
  .price-box{
    padding:8px;
    border-radius:13px;
  }
  .price-box span{font-size:10px}
  .price-box b{font-size:14px}
  .menu-dot{
    width:34px;
    height:34px;
    border-radius:12px;
    font-size:20px;
  }
  .action-menu{
    right:10px;
    top:50px;
  }

  .modal{
    align-items:center;
    padding:22px 12px;
  }
  .modal-box{
    max-height:calc(100vh - 44px);
    border-radius:24px;
    padding:18px;
  }
  .modal-top{
    margin-bottom:14px;
  }
  .modal-top h1{
    font-size:23px;
  }
  .modal-top p{
    font-size:13px;
  }
  .form-grid{
    grid-template-columns:1fr 1fr;
    gap:9px;
  }
  input,select,textarea{
    padding:12px;
    border-radius:13px;
    font-size:13px;
  }
  textarea{
    min-height:80px;
  }
  .save{
    margin-top:12px;
    padding:13px;
  }
}

@media(max-width:470px){
  .login-box{
    padding:24px;
    border-radius:26px;
  }
  .logo{
    width:64px;
    height:64px;
    font-size:30px;
  }

  .welcome h1{
    font-size:25px;
  }

  .phone-info h2{
    font-size:16px;
    margin-bottom:5px;
  }
  .tag{
    font-size:9.5px;
    padding:4px 6px;
  }
  .price-box b{
    font-size:13px;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .modal{
    padding:20px 10px;
  }

  .modal-box{
    max-height:calc(100vh - 40px);
    padding:16px;
    border-radius:22px;
  }

  footer{
    font-size:13px;
    padding-bottom:28px;
  }
}
</style>
</head>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());

document.addEventListener("keydown", function(e){
  if(e.ctrlKey && (e.key === "c" || e.key === "x" || e.key === "u")){
    e.preventDefault();
  }
});
</script>
  
<body>

<div class="login" id="loginScreen">
  <div class="login-box">
    <h1>Giriş</h1>
    <p>Şen İletişim Yönetim Paneli</p>
    &nbsp;
    <input type="password" id="loginPassword" placeholder="Şifre">
    <button class="main-btn" style="margin-top:14px" onclick="login()">Giriş Yap</button>
    <span class="error" id="loginError"></span>
  </div>
</div>

<div class="panel" id="panelScreen">

  <div class="welcome">
    <h1>Hoşgeldiniz <span>Samet Y.</span></h1>
    <p>Telefon yönetim paneli</p>
  </div>

  <div class="top-buttons">
    <button class="exit-btn" onclick="exitPanel()">Çıkış Yap</button>
    <button class="add-btn" onclick="openModal()">Telefon Ekle</button>
  </div>

  <div class="stats">
    <div class="stat">
      <b id="totalDevice">0</b>
      <span>Toplam Cihaz</span>
    </div>
    <div class="stat">
      <b id="turnover">0 TL</b>
      <span>Ciro</span>
    </div>
    <div class="stat">
      <b id="soldDevice">0</b>
      <span>Satılan Cihaz</span>
    </div>
  </div>

  <div class="phone-list" id="phoneList">
    <div class="empty">Telefonlar yükleniyor...</div>
  </div>

</div>

<div class="modal" id="phoneModal">
  <div class="modal-box">
    <div class="modal-top">
      <div>
        <h1 id="modalTitle">Telefon Ekle</h1>
        <p>Marka, model, GB, kasa durumu ve fiyat bilgilerini gir.</p>
      </div>
      <button class="close" onclick="closeModal()">×</button>
    </div>

    <input type="hidden" id="editId">

    <div class="form-grid">
      <label>
        Marka
        <select id="brand" onchange="fillModels(); batteryControl();">
          <option value="">Marka seç</option>
          <option>Apple</option>
          <option>Samsung</option>
          <option>Xiaomi</option>
          <option>Huawei</option>
          <option>Oppo</option>
          <option>Realme</option>
          <option>Vivo</option>
          <option>Honor</option>
          <option>General Mobile</option>
          <option>Tecno</option>
          <option>Infinix</option>
          <option>Reeder</option>
          <option>Casper</option>
          <option>Vestel</option>
          <option>Nokia</option>
          <option>Motorola</option>
        </select>
      </label>

      <label>
        Model
        <select id="model">
          <option value="">Önce marka seç</option>
        </select>
      </label>

      <label>
        Hafıza
        <select id="storageGb">
          <option value="">GB seç</option>
          <option>32 GB</option>
          <option>64 GB</option>
          <option>128 GB</option>
          <option>256 GB</option>
          <option>512 GB</option>
          <option>1 TB</option>
        </select>
      </label>

      <label>
        Kasa Durumu
        <select id="caseStatus">
          <option value="">Kasa durumu seç</option>
          <option>Çok iyi</option>
          <option>İyi</option>
          <option>Normal</option>
          <option>Kötü</option>
        </select>
      </label>

      <label>
        Pil Ömrü
        <input id="battery" placeholder="Sadece Apple için aktif" disabled>
      </label>

      <label>
        Garanti
        <select id="warranty">
          <option value="">Garanti seç</option>
          <option>Var</option>
          <option>Yok</option>
        </select>
      </label>

      <label>
        Geliş Fiyatı
        <input id="buyPrice" type="number" placeholder="₺">
      </label>

      <label>
        Satış Fiyatı
        <input id="sellPrice" type="number" placeholder="₺">
      </label>

      <label class="full">
        Not
        <textarea id="note" placeholder="Telefon hakkında not"></textarea>
      </label>
    </div>

    <button class="main-btn save" onclick="savePhone()">Kaydet</button>
  </div>
</div>

<footer>
  <b>Kaan Ayaz Web Developer</b> tarafından hazırlanmıştır
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  doc,
  updateDoc,
  query,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATTPWhbZcRh9rK72U8x-5KwIz4LMIx9O0",
  authDomain: "seniletisim-2027c.firebaseapp.com",
  projectId: "seniletisim-2027c",
  storageBucket: "seniletisim-2027c.firebasestorage.app",
  messagingSenderId: "863187440862",
  appId: "1:863187440862:web:f0b2a4fda74f6ba3035e4f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PASSWORD = "5435641891";
let phones = [];

const modelData = {
  "Apple":["iPhone 16 Pro Max","iPhone 16 Pro","iPhone 16","iPhone 15 Pro Max","iPhone 15 Pro","iPhone 15","iPhone 14 Pro Max","iPhone 14 Pro","iPhone 14","iPhone 13 Pro Max","iPhone 13 Pro","iPhone 13","iPhone 12 Pro Max","iPhone 12 Pro","iPhone 12","iPhone 11 Pro Max","iPhone 11 Pro","iPhone 11","iPhone X","iPhone 8 Plus"],
  "Samsung":["Galaxy S24 Ultra","Galaxy S24","Galaxy S23 Ultra","Galaxy S23","Galaxy S22 Ultra","Galaxy A55","Galaxy A54","Galaxy A35","Galaxy A34","Galaxy A25","Galaxy A24","Galaxy A15","Galaxy Note 20 Ultra","Galaxy Z Fold","Galaxy Z Flip"],
  "Xiaomi":["Redmi Note 13 Pro","Redmi Note 13","Redmi Note 12 Pro","Redmi Note 12","Redmi Note 11","Mi 11 Lite","Mi 10T","Poco X6 Pro","Poco X5 Pro","Poco F5"],
  "Huawei":["P60 Pro","P50 Pro","P40 Lite","P30 Pro","Mate 40 Pro","Mate 20 Lite","Nova 11","Nova 10","Y9 Prime"],
  "Oppo":["Reno 11","Reno 10","Reno 8","Reno 6","A96","A74","A54","A16"],
  "Realme":["Realme 12 Pro","Realme 11 Pro","Realme 10","Realme 9 Pro","Realme C55","Realme C35"],
  "Vivo":["Vivo V30","Vivo V29","Vivo Y36","Vivo Y35","Vivo Y22"],
  "Honor":["Honor 90","Honor 70","Honor X9A","Honor X8","Honor Magic"],
  "General Mobile":["GM 24 Pro","GM 23","GM 22","GM 21"],
  "Tecno":["Camon 20","Spark 10","Spark 20","Pova 5"],
  "Infinix":["Note 30","Hot 30","Hot 40","Zero 30"],
  "Reeder":["S19 Max","S23 Pro Max","P13 Blue Max"],
  "Casper":["Via X30","Via F30","Via E30"],
  "Vestel":["Venus Z30","Venus V7","Venus E5"],
  "Nokia":["Nokia G21","Nokia G20","Nokia C32"],
  "Motorola":["Moto G84","Moto G54","Moto Edge 40"]
};

window.login = function(){
  const pass = document.getElementById("loginPassword").value;

  if(pass === PASSWORD){
    sessionStorage.setItem("sametPanel","true");
    showPanel();
  }else{
    document.getElementById("loginError").innerText = "Şifre hatalı.";
  }
}

function showPanel(){
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("panelScreen").style.display = "block";
  loadPhones();
}

window.exitPanel = function(){
  sessionStorage.removeItem("sametPanel");
  window.location.href = "https://seniletisim.com.tr";
}

window.openModal = function(){
  clearForm();
  document.getElementById("modalTitle").innerText = "Telefon Ekle";
  document.getElementById("phoneModal").classList.add("active");
}

window.closeModal = function(){
  document.getElementById("phoneModal").classList.remove("active");
}

window.fillModels = function(){
  const brand = document.getElementById("brand").value;
  const model = document.getElementById("model");
  model.innerHTML = `<option value="">Model seç</option>`;

  if(modelData[brand]){
    modelData[brand].forEach(m => {
      model.innerHTML += `<option>${m}</option>`;
    });
  }
}

window.batteryControl = function(){
  const brand = document.getElementById("brand").value;
  const battery = document.getElementById("battery");

  if(brand === "Apple"){
    battery.disabled = false;
    battery.placeholder = "Örn: %89";
  }else{
    battery.value = "";
    battery.disabled = true;
    battery.placeholder = "Apple dışında kapalı";
  }
}

window.savePhone = async function(){
  const id = document.getElementById("editId").value;

  const phone = {
    brand: document.getElementById("brand").value,
    model: document.getElementById("model").value,
    storageGb: document.getElementById("storageGb").value,
    caseStatus: document.getElementById("caseStatus").value,
    battery: document.getElementById("battery").value,
    warranty: document.getElementById("warranty").value,
    buyPrice: Number(document.getElementById("buyPrice").value || 0),
    sellPrice: Number(document.getElementById("sellPrice").value || 0),
    note: document.getElementById("note").value,
    sold: false,
    createdAt: Date.now()
  };

  if(!phone.brand || !phone.model || !phone.storageGb || !phone.caseStatus || !phone.buyPrice || !phone.sellPrice){
    alert("Marka, model, GB, kasa durumu, geliş fiyatı ve satış fiyatı boş kalmasın.");
    return;
  }

  if(id){
    const oldPhone = phones.find(p => p.id === id);
    phone.sold = oldPhone?.sold || false;
    phone.createdAt = oldPhone?.createdAt || Date.now();
    await updateDoc(doc(db, "phones", id), phone);
  }else{
    await addDoc(collection(db, "phones"), phone);
  }

  closeModal();
  clearForm();
  await loadPhones();
}

async function loadPhones(){
  const list = document.getElementById("phoneList");
  list.innerHTML = `<div class="empty">Telefonlar yükleniyor...</div>`;

  try{
    const q = query(collection(db, "phones"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);

    phones = [];
    snap.forEach(item => phones.push({id:item.id, ...item.data()}));

    renderPhones();
  }catch(err){
    list.innerHTML = `<div class="empty">Firebase bağlantı hatası. Firestore Rules kontrol et.</div>`;
    console.error(err);
  }
}

function renderPhones(){
  const list = document.getElementById("phoneList");

  document.getElementById("totalDevice").innerText = phones.length;
  document.getElementById("soldDevice").innerText = phones.filter(p => p.sold).length;

  const ciro = phones.filter(p => p.sold).reduce((t,p) => t + Number(p.sellPrice || 0), 0);
  document.getElementById("turnover").innerText = formatTL(ciro);

  if(phones.length === 0){
    list.innerHTML = `<div class="empty">Henüz telefon eklenmedi.</div>`;
    return;
  }

  list.innerHTML = phones.map(phone => `
    <div class="phone-card ${phone.sold ? "sold" : ""}">
      <div class="phone-info">
        <h2>${safe(phone.brand)} ${safe(phone.model)}</h2>

        <div class="tags">
          <span class="tag">GB: ${safe(phone.storageGb || "-")}</span>
          <span class="tag">Kasa: ${safe(phone.caseStatus || "-")}</span>
          <span class="tag">Pil: ${phone.brand === "Apple" ? safe(phone.battery || "-") : "Yok"}</span>
          <span class="tag">Garanti: ${safe(phone.warranty || "-")}</span>
          <span class="tag">${phone.sold ? "Satıldı" : "Stokta"}</span>
        </div>

        <p>${safe(phone.note || "Not eklenmedi.")}</p>

        <div class="price-row">
          <div class="price-box">
            <span>Geliş Fiyatı</span>
            <b>${formatTL(phone.buyPrice)}</b>
          </div>
          <div class="price-box">
            <span>Satış Fiyatı</span>
            <b>${formatTL(phone.sellPrice)}</b>
          </div>
        </div>
      </div>

      <button class="menu-dot" onclick="toggleAction('${phone.id}')">⋮</button>

      <div class="action-menu" id="menu-${phone.id}">
        <button class="edit" onclick="editPhone('${phone.id}')">Düzenle</button>
        <button class="sold-btn" onclick="toggleSold('${phone.id}')">${phone.sold ? "Stokta Yap" : "Satıldı"}</button>
        <button class="delete" onclick="deletePhone('${phone.id}')">Sil</button>
      </div>
    </div>
  `).join("");
}

window.toggleAction = function(id){
  document.querySelectorAll(".action-menu").forEach(m => {
    if(m.id !== "menu-" + id) m.classList.remove("active");
  });
  document.getElementById("menu-" + id).classList.toggle("active");
}

window.editPhone = function(id){
  const phone = phones.find(p => p.id === id);
  if(!phone) return;

  document.getElementById("modalTitle").innerText = "Telefon Düzenle";
  document.getElementById("editId").value = phone.id;
  document.getElementById("brand").value = phone.brand;
  fillModels();
  document.getElementById("model").value = phone.model;
  document.getElementById("storageGb").value = phone.storageGb || "";
  document.getElementById("caseStatus").value = phone.caseStatus || "";
  batteryControl();
  document.getElementById("battery").value = phone.battery || "";
  document.getElementById("warranty").value = phone.warranty || "";
  document.getElementById("buyPrice").value = phone.buyPrice || "";
  document.getElementById("sellPrice").value = phone.sellPrice || "";
  document.getElementById("note").value = phone.note || "";

  document.getElementById("phoneModal").classList.add("active");
}

window.toggleSold = async function(id){
  const phone = phones.find(p => p.id === id);
  if(!phone) return;

  await updateDoc(doc(db, "phones", id), {
    sold: !phone.sold
  });

  loadPhones();
}

window.deletePhone = async function(id){
  if(confirm("Bu telefon silinsin mi?")){
    await deleteDoc(doc(db, "phones", id));
    loadPhones();
  }
}

window.clearForm = function(){
  document.getElementById("editId").value = "";
  document.getElementById("brand").value = "";
  document.getElementById("model").innerHTML = `<option value="">Önce marka seç</option>`;
  document.getElementById("storageGb").value = "";
  document.getElementById("caseStatus").value = "";
  document.getElementById("battery").value = "";
  document.getElementById("battery").disabled = true;
  document.getElementById("warranty").value = "";
  document.getElementById("buyPrice").value = "";
  document.getElementById("sellPrice").value = "";
  document.getElementById("note").value = "";
}

function formatTL(value){
  return "₺" + new Intl.NumberFormat("tr-TR").format(Number(value || 0));
}

function safe(value){
  return String(value || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

document.addEventListener("keydown", function(e){
  if(e.key === "Enter" && document.getElementById("loginScreen").style.display !== "none"){
    login();
  }
});

if(sessionStorage.getItem("sametPanel") === "true"){
  showPanel();
}
</script>

</body>
</html>
